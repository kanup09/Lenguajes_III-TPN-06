<head>

<body>

    <form action="Registro" id="formulario">
        <p id="titulo-form">Registro de Usuarios</p>
        
        <label for="nom" >Nombre:</label>
        <input type="text" id="nom" name="nom" placeholder="Ingrese su Nombre">
       
        <label for="ape">Apellido:</label>
        <input type="text" id="ape" name="ape" placeholder="Ingrese su apellido">
      
        <label for="dni">DNI:</label>
        <input type="number" id="dni" name="dni"label placeholder="Ingrese su DNI">
      
        <label for="edad" >Edad:</label>
        <input type="number" id="edad" name="edad" placeholder="Ingrese su Edad">
     
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Ingrese su Email">
      
        <input id="Boton" type="submit" value="Registrar">

    </form>

</body>
